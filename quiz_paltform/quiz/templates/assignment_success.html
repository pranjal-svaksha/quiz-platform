{% extends 'base.html' %}

{% block content %}
<div style="max-width: 700px; margin: 40px auto; padding: 30px; background: white; border-radius: 12px; border: 1px solid #bbf7d0; background: #f0fdf4; text-align: center;">
    <div style="font-size: 40px; margin-bottom: 15px;">🔗</div>
    <h2 style="color: #166534; margin-top: 0;">Magic Link Generated!</h2>
    <p style="color: #166534;">Send this private link to <strong>{{ assessment.candidate.name }}</strong>.</p>

    <div style="margin: 25px 0; display: flex; gap: 10px;">
        <input type="text" value="{{ magic_link }}" id="linkInput" readonly
               style="flex: 1; padding: 15px; border: 2px solid #bbf7d0; border-radius: 8px; font-family: monospace; font-size: 0.9rem;">
        <button onclick="copyLink()" style="background: #166534; color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: 600;">
            Copy
        </button>
    </div>

    <div style="font-size: 0.85rem; color: #166534; text-align: left; background: white; padding: 15px; border-radius: 8px;">
        • <strong>Time:</strong> {{ assessment.test_duration_mins }} minutes<br>
        • <strong>Expires:</strong> {{ assessment.expires_at|date:"M d, Y" }}
    </div>

    <a href="{% url 'quiz_list' %}" style="display: inline-block; margin-top: 25px; color: #166534; text-decoration: underline;">Back to Dashboard</a>
</div>

<script>
function copyLink() {
    var copyText = document.getElementById("linkInput");
    copyText.select();
    copyText.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(copyText.value);
    alert("Link copied to clipboard!");
}
</script>
{% endblock %}
