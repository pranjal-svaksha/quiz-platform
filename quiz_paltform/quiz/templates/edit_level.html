{% extends 'base.html' %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto;">
    <a href="{% url 'job_detail' level.job.id %}" style="text-decoration: none; color: var(--primary);">← Back</a>
    <h1>Edit Level: {{ level.level_name }}</h1>

    <div class="card">
        <form method="POST">
            {% csrf_token %}
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">Level Name</label>
                <input type="text" name="level_name" value="{{ level.level_name }}" required
                       style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">Update JD</label>
                <textarea name="jd_text" rows="10" required
                          style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px;">{{ level.jd_text }}</textarea>
            </div>
            <button type="submit" class="btn">Update Level & JD</button>
        </form>
    </div>
</div>
{% endblock %}
